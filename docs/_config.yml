title: Qavo
description: "The foundation your applications stand on."
url: "https://qavo.org"
baseurl: ""

# Theme — Just the Docs via remote_theme
remote_theme: just-the-docs/just-the-docs@v0.11.1

# Color scheme: "light" or "dark"
color_scheme: light

# Logo (optional — add a logo.png in docs/assets/images/ and uncomment)
# logo: "/assets/images/logo.png"

# Favicon (optional — add a favicon.ico in docs/assets/ and uncomment)
# favicon_ico: "/assets/favicon.ico"

# Navigation
nav_enabled: true
nav_sort: order

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Aux links (top-right header links)
aux_links:
  "GitHub":
    - "https://github.com/davidfriscia/qavo"
aux_links_new_tab: true

# Footer
footer_content: "Copyright &copy; 2026 David Friscia. Released under the <a href=\"https://github.com/davidfriscia/qavo/blob/main/LICENSE\">MIT License</a>."

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Last edit timestamp
last_edit_timestamp: true
last_edit_time_format: "%B %e, %Y"

# GitHub edit link
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/davidfriscia/qavo"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "edit"

# Callouts
callouts_level: quiet
callouts:
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green

# Plugins (GitHub Pages safe list — jekyll-seo-tag included by JtD automatically)
plugins:
  - jekyll-sitemap